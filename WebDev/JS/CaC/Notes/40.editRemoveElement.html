<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chai-Khn?</title>
  </head>
  <body style="background-color: rgb(13, 23, 17); color: yellowgreen">
    <ul class="language">
      <li>JavaScript</li>
    </ul>
    <script>
      function addLanguage(langName) {
        const li = document.createElement("li");
        li.innerHTML = `${langName}`;
        document.querySelector(".language").appendChild(li);
      }
      addLanguage("Ruby");

      //   above function appends at last of list, meaning for large lists it needs to traverse all elements first creating lag
      function addOptimizedLanguage(langName) {
        const li = document.createElement("li");
        li.appendChild(document.createTextNode(langName));
        document.querySelector(".language").appendChild(li);
      }
      addOptimizedLanguage("Python");

      //   Edit
      const secondLang = document.querySelector("li:nth-child(2)");
      //   secondLang.innerHTML = "Mojo"; // unoptimized
      const newLi = document.createElement("li");
      newLi.textContent = "Mojo";
      secondLang.replaceWith(newLi);

      // edit
      const firstLang = document.querySelector("li:first-child");
      firstLang.outerHTML = "<li>TypeScript</li>";

      // Remove
      const lastLang = document.querySelector("li:last-child");
      lastLang.remove();
    </script>
  </body>
</html>
