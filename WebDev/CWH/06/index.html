<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inline & Block Elements</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p>
      Para is a Block element, meaning it takes a whole line, the next content
      starts from next line
    </p>
    <a href="https://google.com"
      >Google, Anchor is inline element, it only takes the required space</a
    >
    <div>Div is a Block element</div>
    <span>Span is Inline element</span>
    <a href="">anchor is Inline element</a>
  </body>
</html>
