<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styling lists</title>
    <style>
      nav ul li {
        list-style: devanagari;
        /* list-style-type: "🤨";  */
        /* sets the emoji as list marker */
        list-style-position: inside; /* includes the marker inside the list */
        background-color: yellow;
        border: 2px solid;
        padding: 2px;
        margin: 6px;
        list-style: square inside;  /* both can be set like this too */
        /* list-style-image: url(https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbGR5NHozM2I2aXZuczk3ZXd0cWF2N2djNmRmbHpjOXNyczN2NDlmeCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Ac0fCix8D3oN7DwCEB/giphy.gif); */
        /* sets the img/gif as marker */
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li>Home</li>
        <li>About</li>
        <li>Contact</li>
      </ul>
    </nav>
  </body>
</html>
