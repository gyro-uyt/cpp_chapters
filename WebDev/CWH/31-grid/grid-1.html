<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid-1</title>
    <style>
      .container {
        border: 2px solid black;
        display: grid;
        grid-template-columns: [pehla] 120px [doosra] 100px [teesra]; /* naming of grid lines */
        grid-template-rows: 100px 100px 100px;
      }
      .item {
        border: 2px solid fuchsia;
        height: 40px;
        width: 40px;
      }
      .item-4 {
        /* we want item-4 at item-1's place */
        grid-row: 1/2;
        /* or you can do this (same thing)
           grid-row-start: 1;
           grid-row-end: 2; */
        grid-column: 1 / doosra;
      }
      .item-1 {
        grid-row-start: 1;
        grid-row-end: 2;
        grid-column: 1/2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item-1">1</div>
      <div class="item item-2">2</div>
      <div class="item item-3">3</div>
      <div class="item item-4">4</div>
      <div class="item item-5">5</div>
    </div>
  </body>
</html>
