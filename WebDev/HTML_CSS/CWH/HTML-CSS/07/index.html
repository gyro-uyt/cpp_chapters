<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ID & Classes</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- id's are unique of every element, it is accesed by '#' in CSS -->
  <!-- class's can be given to multiple element, it is accesed by '.' in CSS, multiple classes are separated by a space -->
  <!-- element can have only one id and may have multiple class -->
  <!-- id & class are attributes of the elements -->
  <div id="firstdiv" class="red bg-yellow">First</div>
  <!-- here, red & bg-yellow are 2 classes -->
  <div id="secondiv">Second</div>
</body>

</html>
