<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid-3</title>
    <style>
      .container {
        width: 80vw;
        height: 50vh;
        border: 2px solid black;
        display: grid;
        /* repeat */
        grid-template-columns: repeat(3, 1fr);  /* this is equivalent to "1fr 1fr 1fr" */
        row-gap: 10px;
        /* minmax */
        column-gap: minmax(10px, 44px);

        justify-items: center; /* applying on all elements of container */
        align-items: center;

        /* place content */
        place-content: center;
        /* justify content vs item */
        justify-content: right;

      }
      .item {
        border: 2px solid fuchsia;
        height: 40px;
        width: 40px;
      }
      .item-2 {
        align-self: start;  /* applies only on itself, i.e., single item */
        justify-self: end;
      }
      .item-4 {
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item-1">1</div>
      <div class="item item-2">2</div>
      <div class="item item-3">3</div>
      <div class="item item-4">4</div>
      <div class="item item-5">5</div>
    </div>
  </body>
</html>
