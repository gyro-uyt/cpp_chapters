<!DOCTYPE html>
<html>
<head>
  <title>Web Chat Client</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f1f1f1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 { color: #333; }
    #chat-box {
      width: 90%;
      max-width: 600px;
      height: 400px;
      border: 1px solid #ccc;
      background: white;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }
    .msg { margin: 5px 0; }
    #input-area {
      width: 90%;
      max-width: 600px;
      display: flex;
    }
    input[type=text] {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      margin-left: 5px;
      padding: 10px 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Socket Chat Client (Web)</h2>
  <div id="chat-box"></div>
  <div id="input-area">
    <input type="text" id="msg" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    async function loadMessages() {
      const res = await fetch('/messages');
      const data = await res.json();
      const box = document.getElementById('chat-box');
      box.innerHTML = data.messages.map(m => `<div class="msg">${m}</div>`).join('');
      box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
      const msg = document.getElementById('msg').value;
      if (!msg) return;
      await fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'message=' + encodeURIComponent(msg)
      });
      document.getElementById('msg').value = '';
      await loadMessages();
    }

    setInterval(loadMessages, 1000); // refresh messages every second
    loadMessages();
  </script>
</body>
</html>
